# Trigger workflow run
name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install any dependencies if needed (currently uses only standard library)
    
    - name: Run tests with verbose output
      run: |
        python -m unittest discover tests -v 2>&1
    
    - name: Run tests again to check for flakiness
      if: success()
      run: |
        python -m unittest discover tests -v 2>&1
